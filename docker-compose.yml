# ── Recip — Docker Compose ──────────────────────────────────
# Usage:
#   Production:  docker compose --profile production up -d
#   Development: docker compose up -d
# ────────────────────────────────────────────────────────────

services:
  # ── PHP-FPM application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recip-app
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage/app
      - app_public:/var/www/html/public
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    networks:
      - recip

  # ── Nginx web server ──
  nginx:
    image: nginx:alpine
    container_name: recip-nginx
    restart: unless-stopped
    ports:
      - "3080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - recip

  # ── MariaDB database ──
  db:
    image: mariadb:11
    container_name: recip-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-recip}
      MARIADB_USER: ${DB_USERNAME:-recip}
      MARIADB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - recip

  # ── Cloudflare Tunnel (production only) ──
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: recip-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?Set TUNNEL_TOKEN in .env}
    depends_on:
      - nginx
    profiles:
      - production
    networks:
      - recip

volumes:
  db_data:
    driver: local
  storage:
    driver: local
  app_public:
    driver: local

networks:
  recip:
    driver: bridge
